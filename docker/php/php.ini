; =============================================================================
; docker/php/php.ini — production-hardened PHP settings
; Copied to /usr/local/etc/php/conf.d/zz-app.ini by the Dockerfile.
; =============================================================================

; ── Exposure & version leakage ────────────────────────────────────────────────
expose_php = Off            ; do not emit X-Powered-By: PHP/x.x.x header

; ── Error handling ────────────────────────────────────────────────────────────
display_errors         = Off   ; never show errors to the browser in production
display_startup_errors = Off
log_errors             = On    ; send errors to the PHP-FPM log
error_reporting        = E_ALL ; log everything (bootstrap overrides display only)

; ── Resource limits ───────────────────────────────────────────────────────────
memory_limit       = 256M
max_execution_time = 60
max_input_time     = 60

; ── File uploads ──────────────────────────────────────────────────────────────
file_uploads           = On
upload_max_filesize    = 10M
post_max_size          = 12M
max_file_uploads       = 5     ; only a single photo per form — 5 gives headroom

; ── Remote URL access — OFF for security ─────────────────────────────────────
; These are the two most commonly exploited PHP settings.  Disabling them
; prevents Remote File Include (RFI) attacks even if user input reaches an
; include/require.
allow_url_fopen   = Off
allow_url_include = Off

; ── CGI security ─────────────────────────────────────────────────────────────
; CRITICAL: cgi.fix_pathinfo=1 (the default) allows nginx + PHP-FPM to execute
; arbitrary files as PHP via path manipulation (e.g. /uploads/photo.jpg/x.php).
; Setting it to 0 eliminates this entire class of vulnerability.
cgi.fix_pathinfo = 0

; ── Disable dangerous built-in functions ─────────────────────────────────────
; This application never calls any of these.  Disabling them limits damage from
; code-injection bugs (e.g. eval injection, deserialization RCE) by removing
; the ability to spawn OS processes or eval arbitrary PHP.
disable_functions = exec,passthru,shell_exec,system,proc_open,proc_close,proc_get_status,proc_terminate,proc_nice,popen,pclose,pcntl_exec,pcntl_fork,pcntl_signal,pcntl_waitpid,pcntl_wexitstatus,pcntl_wifexited,pcntl_wifsignaled,pcntl_wtermsig,dl

; ── Session security ──────────────────────────────────────────────────────────
; These reinforce what Session::start() already sets via ini_set(), providing
; defense-in-depth at the INI layer so the settings are active before bootstrap.
session.use_strict_mode        = 1   ; reject unrecognised session IDs
session.use_only_cookies       = 1   ; never accept session ID in the URL
session.cookie_httponly        = 1   ; block JavaScript access to the cookie
session.cookie_samesite        = Lax ; CSRF mitigation
session.sid_length             = 64  ; 64-char session ID
session.sid_bits_per_character = 6   ; 384 bits of entropy

; ── Timezone ──────────────────────────────────────────────────────────────────
date.timezone = Asia/Manila

; ── Realpath cache — small speedup for production ────────────────────────────
realpath_cache_size = 4096k
realpath_cache_ttl  = 120
