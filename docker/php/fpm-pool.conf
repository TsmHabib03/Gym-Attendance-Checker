; =============================================================================
; docker/php/fpm-pool.conf — PHP-FPM pool configuration (www pool)
; Copied to /usr/local/etc/php-fpm.d/zz-app-pool.conf by the Dockerfile,
; overriding the defaults in www.conf.
;
; Tuning guide
; ────────────
; pm.max_children = (available RAM − OS overhead) / per-process RAM
; A lean Symfony/Laravel process uses ~30–50 MB; this app uses ~20–30 MB.
; Start with these defaults and adjust based on `docker stats`.
; =============================================================================

[www]

; ── Process manager ──────────────────────────────────────────────────────────
; "dynamic" spawns children on demand and recycles idle ones.  For a scanner
; app with bursty traffic this is better than "static" (wastes RAM when idle)
; or "ondemand" (cold-start latency on every burst).
pm                   = dynamic
pm.max_children      = 20     ; hard cap — tune down if < 512 MB RAM per container
pm.start_servers     = 4      ; pre-fork workers on startup
pm.min_spare_servers = 2      ; keep at least 2 idle workers ready
pm.max_spare_servers = 8      ; kill excess idle workers above this threshold
pm.max_requests      = 500    ; recycle each worker after N requests (memory leak guard)

; ── Process identity ─────────────────────────────────────────────────────────
user  = www-data
group = www-data

; ── Listening socket ─────────────────────────────────────────────────────────
listen = 0.0.0.0:9000

; ── Logging ──────────────────────────────────────────────────────────────────
; Log slow requests (>5 s) to diagnose performance issues.
slowlog           = /var/log/php-fpm/slow.log
request_slowlog_timeout = 5s

; Catch worker crashes and log them (prevents silent zombie processes).
catch_workers_output = yes

; ── Security ─────────────────────────────────────────────────────────────────
; Clear the environment so worker processes cannot read Docker secrets injected
; as env vars (DB_PASS, APP_SECRET, etc.) through information-disclosure bugs.
; The application reads these explicitly via Env::load() from the mounted .env file.
clear_env = yes

; Re-inject only the variables the application needs at the FPM level.
; Docker compose passes these through env_file so they are in the container env;
; clear_env=yes wipes them, so we restore them here.
env[APP_ENV]         = $APP_ENV
env[APP_NAME]        = $APP_NAME
env[APP_URL]         = $APP_URL
env[APP_TIMEZONE]    = $APP_TIMEZONE
env[APP_DEBUG]       = $APP_DEBUG
env[APP_SECRET]      = $APP_SECRET
env[DB_HOST]         = $DB_HOST
env[DB_PORT]         = $DB_PORT
env[DB_NAME]         = $DB_NAME
env[DB_USER]         = $DB_USER
env[DB_PASS]         = $DB_PASS
env[SESSION_COOKIE_NAME]      = $SESSION_COOKIE_NAME
env[SESSION_SECURE]           = $SESSION_SECURE
env[SESSION_SAMESITE]         = $SESSION_SAMESITE
env[SESSION_LIFETIME]         = $SESSION_LIFETIME
env[TRUSTED_PROXIES]          = $TRUSTED_PROXIES
env[DUPLICATE_SCAN_WINDOW_SECONDS]    = $DUPLICATE_SCAN_WINDOW_SECONDS
env[CHECKIN_RATE_LIMIT_WINDOW_SECONDS] = $CHECKIN_RATE_LIMIT_WINDOW_SECONDS
env[CHECKIN_RATE_LIMIT_MAX_ATTEMPTS]   = $CHECKIN_RATE_LIMIT_MAX_ATTEMPTS
env[LOGIN_RATE_LIMIT_WINDOW_SECONDS]   = $LOGIN_RATE_LIMIT_WINDOW_SECONDS
env[LOGIN_RATE_LIMIT_MAX_ATTEMPTS]     = $LOGIN_RATE_LIMIT_MAX_ATTEMPTS
env[RATE_LIMIT_RETENTION_DAYS]         = $RATE_LIMIT_RETENTION_DAYS
env[PHOTO_CAPTURE_ENABLED]    = $PHOTO_CAPTURE_ENABLED
env[EXPIRY_REMINDER_DAYS]     = $EXPIRY_REMINDER_DAYS
env[SMTP_HOST]       = $SMTP_HOST
env[SMTP_PORT]       = $SMTP_PORT
env[SMTP_USERNAME]   = $SMTP_USERNAME
env[SMTP_PASSWORD]   = $SMTP_PASSWORD
env[SMTP_ENCRYPTION] = $SMTP_ENCRYPTION
env[MAIL_FROM_ADDRESS] = $MAIL_FROM_ADDRESS
env[MAIL_FROM_NAME]    = $MAIL_FROM_NAME
env[ADMIN_ALERT_EMAIL] = $ADMIN_ALERT_EMAIL
