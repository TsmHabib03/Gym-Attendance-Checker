################################################################################
# /etc/nginx/nginx.conf — production-hardened global configuration
#
# Rate-limit zones MUST live at the http level; they cannot be defined inside
# a server or location block.  This file is copied to /etc/nginx/nginx.conf in
# the nginx Docker image so the zones are available to default.conf.
################################################################################

user  nginx;
worker_processes  auto;           # one worker per CPU core
worker_rlimit_nofile  65535;      # raise open-file limit for high concurrency

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Harden server identity ───────────────────────────────────────────────
    server_tokens off;   # removes nginx version from Server header and error pages

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - [$time_local] "$request" '
                      '$status $body_bytes_sent rt=$request_time '
                      '"$http_user_agent" fwd="$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main buffer=32k flush=5s;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # ── Request size / timeout limits ────────────────────────────────────────
    # client_max_body_size is overridden per-server below (12 MB for photo uploads)
    client_body_buffer_size       16k;
    client_header_buffer_size      1k;
    large_client_header_buffers  4 8k;
    client_body_timeout           30s;
    client_header_timeout         30s;
    send_timeout                  30s;
    reset_timedout_connection      on;

    # ── Rate-limit zones (keyed on binary client IP) ─────────────────────────
    #
    # Zone          Key              Memory   Sustained rate
    # ──────────    ───────────────  ───────  ───────────────────────────────
    # login         IP               10 MB    5  req / minute
    # api           IP               10 MB    30 req / minute
    # general       IP               20 MB    120 req / minute
    #
    # Burst allowances are defined in default.conf per-location.
    limit_req_zone  $binary_remote_addr  zone=login:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=api:10m     rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=general:20m rate=120r/m;

    # ── Concurrent-connection limit ───────────────────────────────────────────
    limit_conn_zone $binary_remote_addr  zone=conn_per_ip:10m;

    # Return 429 (not the default 503) for rate-limit rejections
    limit_req_status  429;
    limit_conn_status 429;

    include /etc/nginx/conf.d/*.conf;
}
