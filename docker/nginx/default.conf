################################################################################
# /etc/nginx/conf.d/default.conf — production-hardened virtual host
#
# Load balancing
# ──────────────
# The "php_fpm" upstream points at the "app" service.  Docker's internal DNS
# resolves that hostname to ALL running containers, so scaling is free:
#
#   docker compose up -d --scale app=3
#
# Nginx will round-robin (least_conn) across however many replicas are up.
# When a replica is restarted, Docker re-registers it before nginx retries,
# so zero-downtime rolling restarts work out of the box.
################################################################################

# ---------------------------------------------------------------------------
# PHP-FPM upstream — least-connections with connection keepalive
# ---------------------------------------------------------------------------
upstream php_fpm {
    least_conn;
    server app:9000;   # Docker DNS resolves to all replicas
    keepalive 16;      # keep 16 idle connections open to PHP-FPM
}

server {
    listen 80;
    server_name _;

    root  /var/www/html/public;
    index index.php;

    # ── File-size cap (member + check-in photos) ─────────────────────────────
    client_max_body_size 12m;

    # ── Concurrent-connection limit per IP ───────────────────────────────────
    limit_conn conn_per_ip 50;

    # ── Default rate limit (burst 40, nodelay = accept burst then enforce) ───
    limit_req zone=general burst=40 nodelay;

    # ── Security headers ─────────────────────────────────────────────────────
    # PHP also sets these for dynamic responses; nginx covers static files and
    # error pages that never touch PHP.
    add_header X-Frame-Options              "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options       "nosniff"                           always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy           "camera=(self), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                       always;
    add_header Cross-Origin-Resource-Policy "same-origin"                       always;
    # HSTS — uncomment when TLS terminates at nginx (not at Cloudflare).
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Block dotfiles (.env, .git, .htaccess …) ─────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block composer / build artefacts from being served ───────────────────
    location ~* ^/(composer\.(json|lock)|package(-lock)?\.json|Makefile|Dockerfile.*|docker-compose.*)$ {
        deny all;
        return 404;
    }

    # ── Block PHP source directories from being served ───────────────────────
    location ~* ^/(vendor|src|database|storage|docker)/ {
        deny all;
        return 404;
    }

    # ── Favicons and robots (small cache, no access log) ─────────────────────
    location ~* ^/(favicon\.(ico|png)|apple-touch-icon\.png|robots\.txt|sitemap\.xml)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    # ── Static assets — long-lived immutable cache ───────────────────────────
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ── Upload directory — serve files, NEVER execute PHP ────────────────────
    # Files live under /uploads/member_photos/ and /uploads/checkin_photos/.
    # PHP execution is explicitly refused here; a misnamed/polyglot upload
    # file can never be run even if a future misconfiguration occurs.
    location ^~ /uploads/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Belt-and-suspenders: refuse PHP inside uploads at all costs.
        location ~ \.php$ {
            deny all;
            return 403;
        }
    }

    # ── Login — tight rate limit (5 req/min, burst 3) ────────────────────────
    location = /login {
        limit_req zone=login burst=3 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    # ── Check-in API — scanner-appropriate rate limit ─────────────────────────
    location = /api/checkin {
        limit_req zone=api burst=10 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    # ── QR regenerate API ─────────────────────────────────────────────────────
    location = /api/members/regenerate-qr {
        limit_req zone=api burst=5 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    # ── Main front-controller ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # ── SECURITY: Only index.php may be executed — block all other .php files ─
    # This prevents direct execution of any accidentally uploaded or exposed
    # PHP file.  The regex is evaluated before the catch-all \.php$ below.
    location ~ ^/(?!index\.php$).+\.php$ {
        deny all;
        return 403;
    }

    # ── PHP-FPM pass ─────────────────────────────────────────────────────────
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;
        fastcgi_index  index.php;
        fastcgi_pass   php_fpm;

        # Timeouts
        fastcgi_connect_timeout  10s;
        fastcgi_read_timeout     60s;
        fastcgi_send_timeout     30s;

        # Buffers
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;

        # Hide PHP version banner from all responses
        fastcgi_hide_header X-Powered-By;

        # No caching on PHP responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma        "no-cache"                                        always;
    }

    # ── Custom 429 — consistent JSON body for API callers ────────────────────
    error_page 429 @too_many_requests;
    location @too_many_requests {
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header Retry-After  "60"                              always;
        return 429 '{"ok":false,"message":"Too many requests. Please slow down."}';
    }

    # ── Custom 403 ───────────────────────────────────────────────────────────
    error_page 403 @forbidden;
    location @forbidden {
        add_header Content-Type "text/plain; charset=utf-8" always;
        return 403 "Forbidden.";
    }
}
